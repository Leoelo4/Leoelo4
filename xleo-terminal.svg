<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .cursor { animation: blink 1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .line1 { opacity: 0; animation: fadein 0.4s ease forwards 0.3s; }
      .line2 { opacity: 0; animation: fadein 0.4s ease forwards 0.9s; }
      .line3 { opacity: 0; animation: fadein 0.4s ease forwards 1.5s; }
      .line4 { opacity: 0; animation: fadein 0.4s ease forwards 2.1s; }
      @keyframes fadein { to { opacity: 1; } }
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window body -->
  <rect x="20" y="20" width="860" height="320" rx="12" fill="#0a0e14" stroke="#1c2531" stroke-width="1.5"/>

  <!-- Title bar -->
  <path d="M20 32 a12 12 0 0 1 12-12 h836 a12 12 0 0 1 12 12 v26 h-860 z" fill="#11151c"/>
  <line x1="20" y1="58" x2="880" y2="58" stroke="#1c2531" stroke-width="1.5"/>

  <!-- Traffic lights -->
  <circle cx="46" cy="39" r="6.5" fill="#ff5f57"/>
  <circle cx="68" cy="39" r="6.5" fill="#febc2e"/>
  <circle cx="90" cy="39" r="6.5" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="450" y="44" text-anchor="middle" class="mono" font-size="13" fill="#6b7a8f">xleo@studio: ~</text>

  <!-- Cyan accent stripe -->
  <rect x="20" y="58" width="860" height="3" fill="#00e5ff" opacity="0.85"/>

  <!-- Prompt line -->
  <text x="52" y="96" class="mono line1" font-size="15" fill="#6b7a8f">$ <tspan fill="#c9d1d9">run xleo --init</tspan></text>

